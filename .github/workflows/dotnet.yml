name: .NET

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  lint:
    name: Lint
    if: github.event_name == 'pull_request' || github.event_name == 'draft'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies
        run: dotnet restore src/c-sharp/Archlens.sln

      - name: Auto-fix lint issues & remove unused imports
        run: |
          # To exclude files or folders, append e.g.:
          #   --exclude "src/c-sharp/SomeFolder/**/*.cs"
          # To suppress a specific rule in code, use: #pragma warning disable <RULE_ID>
          dotnet format src/c-sharp/Archlens.sln 
          --no-restore 
          --verbosity diagnostic

      - name: Commit fixes (if any)
        run: |
          git diff --quiet && echo "Nothing to fix." && exit 0
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: auto-fix lint issues"
          git push

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies
        run: dotnet restore src/c-sharp/Archlens.sln

      - name: Build
        run: dotnet build src/c-sharp/Archlens.sln --no-restore

      - name: Test
        run: dotnet test src/c-sharp/Archlens.sln --no-build --verbosity normal
